# Rebase Translation PRs
#
# Install this workflow in the TARGET (translated) repository.
# When a translation PR is merged, this workflow automatically rebases the
# other open translation PRs against the updated main branch. It covers both
# kinds this tool creates: `translation-sync-*` branches from the Action's sync
# mode, and `resync/*` branches from the CLI's `forward --github`.
#
# This eliminates merge conflicts caused by multiple upstream PRs
# modifying the same files. See: https://github.com/QuantEcon/action-translation/issues/63
#
# HARNESS NOTE: this mirrors the production template verbatim, including the
# published-tag pin. That is the point — the harness exists to catch config
# regressions, not only code regressions, and a `uses: ./action` local build
# would never exercise whether `@v0` resolves to the intended release.
# See QuantEcon/action-translation#109.

name: Rebase Translation PRs

on:
  pull_request:
    types: [closed]

jobs:
  rebase:
    # Only run when a translation PR is merged. Both prefixes must be listed:
    # sync mode creates `translation-sync-*`, while the CLI's `forward --github`
    # creates `resync/*`, and a wave of resync PRs goes stale the same way.
    # Keep this in step with `isTranslationBranch` in the action's src/branch-naming.ts
    # — this `if` decides whether the job runs, that predicate decides which open PRs
    # it then rebases, so a prefix matching only one of them is a no-op run.
    if: >
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.head.ref, 'translation-sync-') ||
       startsWith(github.event.pull_request.head.ref, 'resync/'))
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    # Prevent concurrent rebases from overlapping
    concurrency:
      group: rebase-translations
      cancel-in-progress: false

    steps:
      - name: Rebase open translation PRs
        # TEMPORARY: pinned to the head of action-translation PR #124 to validate the
        # rebase-stale-siblings feature pre-release (harness-first policy). The @v0 tag
        # is v0.18.1, which does not carry #124 — this is the documented way to test
        # unreleased code through the workflow layer. Restore @v0 after validation.
        uses: QuantEcon/action-translation@341fa9f03b34ce91f006b99b685dd4e5a4d2e082
        with:
          mode: rebase
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # PAT rather than GITHUB_TOKEN: commits pushed with GITHUB_TOKEN do not
          # trigger workflows, so refreshed branches would get no CI runs — the exact
          # no-op this run exists to disprove. See action-translation#125.
          github-token: ${{ secrets.QUANTECON_SERVICES_PAT }}
          # On for this validation: refresh non-overlapping siblings.
          rebase-stale-siblings: 'true'
